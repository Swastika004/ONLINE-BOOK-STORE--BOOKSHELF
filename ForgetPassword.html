<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BookStore</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --background: #f9fafb;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--white);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo a {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .description {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:active {
            transform: scale(0.98);
        }

        .back-to-login {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-to-login a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fee2e2;
        }

        .message.success {
            background: #ecfdf5;
            color: var(--success);
            border: 1px solid #d1fae5;
        }

        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="/">TheBookShelf</a>
        </div>
        
        <h1>Forgot Password</h1>
        <p class="description">Enter your email address and we'll send you a link to reset your password.</p>

        <div id="message" class="message"></div>

        <form id="forgotPasswordForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="Enter your email"
                        autocomplete="email"
                    >
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor">
                        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path>
                        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path>
                    </svg>
                </div>
            </div>

            <button type="submit">
                <span id="buttonText">Reset Password</span>
                <div id="loading" class="loading"></div>
            </button>
        </form>

        <div class="back-to-login">
            <a href="../SignInForms/SignIn.html">Back to Login</a>
        </div>
    </div>

    <script>
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }

        function hideMessage() {
            const message = document.getElementById('message');
            message.style.display = 'none';
        }

        function setLoading(isLoading) {
            const button = document.querySelector('button');
            const buttonText = document.getElementById('buttonText');
            const loading = document.getElementById('loading');

            if (isLoading) {
                button.disabled = true;
                buttonText.style.display = 'none';
                loading.style.display = 'block';
            } else {
                button.disabled = false;
                buttonText.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value.trim();
            const form = document.getElementById('forgotPasswordForm');

            if (!validateEmail(email)) {
                form.classList.add('shake');
                showMessage('Please enter a valid email address', 'error');
                setTimeout(() => form.classList.remove('shake'), 500);
                return;
            }

            setLoading(true);

            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));

                showMessage('Password reset link has been sent to your email', 'success');
                document.getElementById('email').value = '';
            } catch (error) {
                showMessage('An error occurred. Please try again later.', 'error');
            } finally {
                setLoading(false);
            }
        }

        // Clear message when user starts typing
        document.getElementById('email').addEventListener('input', hideMessage);
    </script>
</body>
</html>
