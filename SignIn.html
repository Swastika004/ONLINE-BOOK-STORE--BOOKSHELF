<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('whitebookshelf.jpg');
            background-repeat: no-repeat;
            background-size: cover;
        }

        .login-box {
            display: flex;
            justify-content: center;
            flex-direction: column;
            width: 440px;
            height: 480px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .login-header header {
            color: #333;
            font-size: 30px;
            font-weight: 600;
        }

        .input-box .input-field {
            width: 100%;
            height: 60px;
            font-size: 17px;
            padding: 0 25px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 5px 10px 1px rgba(0, 0, 0, 0.05);
            outline: none;
            transition: 0.3s;
        }

        ::placeholder {
            font-weight: 500;
            color: #222;
        }

        .input-field:focus {
            width: 105%;
        }

        .forgot {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        section {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #555;
        }

        #check {
            margin-right: 10px;
        }

        a {
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        section a {
            color: #555;
        }

        .input-submit {
            position: relative;
        }

        .submit-btn {
            width: 100%;
            height: 60px;
            background: #222;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .rm {
            font-weight: 700;
        }

        .input-submit label {
            position: absolute;
            top: 45%;
            left: 50%;
            color: #fff;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }

        .submit-btn{

            background-color: #fff;
            color: #000;


        }

        .submit-btn:hover {
            background: gray;
            transform: scale(1.05, 1);
            color: #fff;
            font-weight: 600;
            font-size: larger;
        }

        .sign-up-link {
            text-align: center;
            font-size: 15px;
            margin-top: 20px;
        }

        .sign-up-link a {
            color: #000;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <form method="POST" action="http://localhost:8080/TestWeb/SessServe" name="frmLogin" onsubmit="return funLogin()">
        <div class="login-box">
            <div class="login-header">
                <header>Sign In</header>
            </div>
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Email" autocomplete="off" onkeydown="funDown()" id="txtusername" name="txtusername" required>
                <div id="erremail" style="color: red; font-size: 0.85em;"></div>
            </div>
            <div class="input-box">
                <input type="password" class="input-field" placeholder="Password" autocomplete="off" name="txtpassword" id="txtpassword" required>
            </div>
            <div class="forgot">
                <section>
                    <input type="checkbox" id="check" onchange="funChange(this)">
                    <label for="check" class="rm">Remember me</label>
                </section>
                <section>
                    <a href="../ForgetPassword/ForgetPassword.html">Forgot password</a>
                </section>
            </div>
            <div class="input-submit">
                <button class="submit-btn" id="bLogin" disabled>Login</button>
            </div>
            <div class="sign-up-link">
                <p>Don't have an account? <a href="../SignUpForms/Form.html" onclick="funRegis()">Sign Up</a></p>
            </div>
        </div>
    </form>

    <script>
        function funClose() {
            if (window.parent) {
                if (confirm("Closing window......") === true) window.parent.window.close();
            } else if (confirm("Closing window......") === true) window.close();
        }

        function funChange(checkbox) {
            document.getElementById("bLogin").disabled = !checkbox.checked;
        }

        function funLogin() {
            if (document.getElementById("txtusername").value === "") {
                document.getElementById("erremail").innerHTML = "Email cannot be blank";
                return false;
            } else {
                return true;
            }
        }

        function funDown() {
            document.getElementById("erremail").innerHTML = "";
        }

        function funRegis() {
            location.href = "http://localhost:8080/TestWeb/Pages/Register.html";
        }
    </script>
</body>
</html>
